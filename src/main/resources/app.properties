# ============================================================================
# HotelNova - application configuration
# ============================================================================

# --- Application metadata ---------------------------------------------------
app.name=HotelNova
app.version=1.0.0

# --- View selection ---------------------------------------------------------
# Switches between the two view implementations at startup.
# console | swing
view.type=swing

# --- Business rules ---------------------------------------------------------
# Value-Added Tax applied to every reservation cost.
business.iva=0.19

# --- Reports ----------------------------------------------------------------
# Directory where CSV exports are written.
reports.directory=./reports/

# --- Logging ----------------------------------------------------------------
# Log file path.
logging.file=./app.log
