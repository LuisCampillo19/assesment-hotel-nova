# ============================================================================
# HotelNova - application configuration
# ============================================================================

# --- Application metadata ---------------------------------------------------
app.name=HotelNova
app.version=1.0.0

# --- View selection ---------------------------------------------------------
# Switches between the two view implementations at startup.
# Allowed values: console | swing
view.type=swing

# --- Business rules ---------------------------------------------------------
# Value-Added Tax applied to every reservation cost.
# Stored as decimal (0.19 means 19%). Colombia general IVA is 19%.
business.iva=0.19

# --- Reports ----------------------------------------------------------------
# Directory where CSV exports are written. Created at runtime if missing.
reports.directory=./reports/

# --- Logging ----------------------------------------------------------------
# Log file path. Rotated by JUL when it grows past the limit.
logging.file=./app.log
