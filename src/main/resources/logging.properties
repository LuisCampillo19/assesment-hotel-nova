# ============================================================================
# java.util.logging configuration
# ============================================================================
# Loaded at startup by AppLogger. Output goes to BOTH the console and
# the file specified by java.util.logging.FileHandler.pattern.
# ============================================================================

# Two handlers: console + rotating file
handlers=java.util.logging.ConsoleHandler,java.util.logging.FileHandler

# Default level for all loggers
.level=INFO

# --- Console handler --------------------------------------------------------
java.util.logging.ConsoleHandler.level=INFO
java.util.logging.ConsoleHandler.formatter=java.util.logging.SimpleFormatter

# --- File handler -----------------------------------------------------------
# pattern: file path. %g is the rotation index when the file fills up.
# limit: 1 MB per file
# count: keep up to 5 rotated files
# append: true means new runs add to the existing file instead of overwriting
java.util.logging.FileHandler.pattern=app.log
java.util.logging.FileHandler.limit=1048576
java.util.logging.FileHandler.count=5
java.util.logging.FileHandler.append=true
java.util.logging.FileHandler.level=INFO
java.util.logging.FileHandler.formatter=java.util.logging.SimpleFormatter

# --- Format -----------------------------------------------------------------
# %1$tF %1$tT  -> 2026-04-27 14:35:02
# %4$s         -> level (INFO, WARNING, etc.)
# %3$s         -> logger name
# %5$s         -> message
# %6$s         -> stack trace (if any)
java.util.logging.SimpleFormatter.format=%1$tF %1$tT  [%4$-7s] %3$s - %5$s%6$s%n
